<svg viewBox="0 0 500 560" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark background -->
  <rect width="500" height="560" fill="#0b1e2e"/>

  <!-- Subtle background rings for depth -->
  <circle cx="250" cy="280" r="240" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="80"/>

  <!-- ====== PANEL SOLAR @ (250, 88) ====== -->
  <circle cx="250" cy="83" r="73" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Panel rect (3×3 grid) -->
  <rect x="196" y="44" width="108" height="70" rx="4" fill="none" stroke="white" stroke-width="2.8"/>
  <!-- Horizontal grid lines -->
  <line x1="196" y1="67.3" x2="304" y2="67.3" stroke="white" stroke-width="1.7"/>
  <line x1="196" y1="90.7" x2="304" y2="90.7" stroke="white" stroke-width="1.7"/>
  <!-- Vertical grid lines -->
  <line x1="232" y1="44" x2="232" y2="114" stroke="white" stroke-width="1.7"/>
  <line x1="268" y1="44" x2="268" y2="114" stroke="white" stroke-width="1.7"/>
  <!-- Support stand -->
  <line x1="234" y1="114" x2="222" y2="134" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="266" y1="114" x2="278" y2="134" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="213" y1="134" x2="287" y2="134" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Sun (top-right) -->
  <circle cx="320" cy="38" r="15" fill="none" stroke="white" stroke-width="2.4"/>
  <line x1="320" y1="15" x2="320" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="320" y1="55" x2="320" y2="61" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="297" y1="38" x2="303" y2="38" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="337" y1="38" x2="343" y2="38" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="303" y1="22" x2="307" y2="26" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="333" y1="50" x2="337" y2="54" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="303" y1="54" x2="307" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="333" y1="26" x2="337" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Label -->
  <text x="250" y="160" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="3">PANEL SOLAR</text>


  <!-- ====== ARROW Panel Solar → Inversor (diagonal down-left) ====== -->
  <line x1="216" y1="172" x2="182" y2="215" stroke="white" stroke-width="2.4" stroke-dasharray="8 6" opacity="0.72" stroke-linecap="round"/>
  <polygon points="175,228 178,210 192,218" fill="white" opacity="0.72"/>


  <!-- ====== INVERSOR @ (148, 298) ====== -->
  <circle cx="148" cy="293" r="73" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Box frame -->
  <rect x="104" y="255" width="88" height="76" rx="5" fill="none" stroke="white" stroke-width="2.8"/>
  <!-- Display window -->
  <rect x="114" y="265" width="68" height="28" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <!-- Sine wave (AC output) -->
  <path d="M120 279 C124 271 128 271 132 279 C136 287 140 287 144 279 C148 271 152 271 156 279 C160 287 164 287 168 279 C172 271 176 271 178 279" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Indicator dots (bottom of box) -->
  <circle cx="122" cy="341" r="3.5" fill="white" opacity="0.4"/>
  <circle cx="148" cy="341" r="3.5" fill="white" opacity="0.4"/>
  <circle cx="174" cy="341" r="3.5" fill="white" opacity="0.4"/>

  <!-- Label -->
  <text x="148" y="384" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="3">INVERSOR</text>


  <!-- ====== BIDIRECTIONAL ARROWS Inversor ↔ Red Eléctrica ====== -->
  <!-- Arrow right → at y=286 -->
  <line x1="226" y1="286" x2="278" y2="286" stroke="white" stroke-width="2.4" stroke-dasharray="8 5" opacity="0.72"/>
  <polygon points="291,286 276,279 276,293" fill="white" opacity="0.72"/>
  <!-- Arrow left ← at y=305 -->
  <line x1="280" y1="305" x2="228" y2="305" stroke="white" stroke-width="2.4" stroke-dasharray="8 5" opacity="0.72"/>
  <polygon points="215,305 230,298 230,312" fill="white" opacity="0.72"/>


  <!-- ====== RED ELÉCTRICA @ (352, 298) ====== -->
  <circle cx="352" cy="293" r="73" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Power tower -->
  <!-- Main pole -->
  <line x1="352" y1="253" x2="352" y2="352" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Top crossarm -->
  <line x1="315" y1="263" x2="389" y2="263" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Second crossarm -->
  <line x1="323" y1="283" x2="381" y2="283" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Diagonal braces from top arm to pole -->
  <line x1="333" y1="263" x2="352" y2="285" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="371" y1="263" x2="352" y2="285" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Insulators (circles at tips of top arm) -->
  <circle cx="315" cy="266" r="3.5" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="389" cy="266" r="3.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Hanging wires -->
  <path d="M315 270 Q307 290 315 286" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M389 270 Q397 290 389 286" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs spreading at base -->
  <line x1="352" y1="352" x2="328" y2="373" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="352" y1="352" x2="376" y2="373" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Ground base -->
  <line x1="320" y1="373" x2="384" y2="373" stroke="white" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Labels -->
  <text x="352" y="395" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2.5">RED</text>
  <text x="352" y="413" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2.5">ELÉCTRICA</text>

  <!-- VENTA EXCEDENTES badge (above Red Eléctrica) -->
  <line x1="352" y1="248" x2="352" y2="230" stroke="#4ade80" stroke-width="1.8" stroke-dasharray="5 4" opacity="0.9"/>
  <polygon points="352,218 345,233 359,233" fill="#4ade80" opacity="0.9"/>
  <rect x="276" y="190" width="152" height="28" rx="14" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1.7"/>
  <text x="352" y="208" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="10.5" font-weight="700" fill="#4ade80" letter-spacing="1.5">VENTA EXCEDENTES</text>


  <!-- ====== ARROW Inversor → Casa (diagonal down) ====== -->
  <line x1="180" y1="366" x2="224" y2="430" stroke="white" stroke-width="2.4" stroke-dasharray="8 6" opacity="0.72" stroke-linecap="round"/>
  <polygon points="232,444 220,428 234,425" fill="white" opacity="0.72"/>


  <!-- ====== CASA @ (250, 478) ====== -->
  <circle cx="250" cy="473" r="73" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Roof -->
  <path d="M204 486 L250 443 L296 486" fill="none" stroke="white" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Walls -->
  <rect x="211" y="486" width="78" height="52" fill="none" stroke="white" stroke-width="2.8"/>
  <!-- Door -->
  <rect x="235" y="501" width="30" height="37" rx="2" fill="none" stroke="white" stroke-width="2.4"/>
  <!-- Left window -->
  <rect x="217" y="494" width="14" height="13" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Right window -->
  <rect x="269" y="494" width="14" height="13" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Chimney -->
  <rect x="270" y="456" width="12" height="26" fill="none" stroke="white" stroke-width="2"/>

  <!-- Label -->
  <text x="250" y="555" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="3">CASA</text>

</svg>
